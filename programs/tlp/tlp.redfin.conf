# <https://linuxblog.io/boost-battery-life-on-linux-laptop-tlp/>
# <https://gist.github.com/kikislater/4de3d79b0459681933ba630e29bcb0e0>

# Battery-focused TLP profile for ThinkPad X13 Gen 6 AMD.
# Check CPU frequency limits with: sudo tlp-stat -p

CPU_DRIVER_OPMODE_ON_AC=active
# guided lets the powersave governor actively steer frequency on battery
CPU_DRIVER_OPMODE_ON_BAT=guided

CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# Values are in kHz. Keep battery usable while avoiding high turbo states.
CPU_SCALING_MIN_FREQ_ON_AC=623377
CPU_SCALING_MAX_FREQ_ON_AC=5090910
CPU_SCALING_MIN_FREQ_ON_BAT=623377
CPU_SCALING_MAX_FREQ_ON_BAT=1200000

CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power

CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

# consolidate tasks onto fewer cores so idle cores reach deeper C-states
SCHED_POWERSAVE_ON_AC=0
SCHED_POWERSAVE_ON_BAT=1

PLATFORM_PROFILE_ON_AC=performance
PLATFORM_PROFILE_ON_BAT=low-power

# 1=minimal backlight reduction, 3=aggressive; 1 is unnoticeable but saves meaningful GPU power
AMDGPU_ABM_LEVEL_ON_AC=0
AMDGPU_ABM_LEVEL_ON_BAT=1

MEM_SLEEP_ON_AC=s2idle
MEM_SLEEP_ON_BAT=deep

# batch dirty page writes longer on battery to reduce NVMe wakeups (default: 15s)
MAX_LOST_WORK_SECS_ON_AC=15
MAX_LOST_WORK_SECS_ON_BAT=60

PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto

SOUND_POWER_SAVE_ON_AC=0
SOUND_POWER_SAVE_ON_BAT=1
SOUND_POWER_SAVE_CONTROLLER_ON_BAT=Y

NMI_WATCHDOG=0
WOL_DISABLE=Y

WIFI_PWR_ON_AC=off # disable power saving mode
WIFI_PWR_ON_BAT=on # enable power saving mode

# power off radios entirely on battery when not connected (not just autosuspend)
DEVICES_TO_DISABLE_ON_BAT_NOT_IN_USE=bluetooth wwan

## Frequent Travelers:
##     Start Charge Threshold: 75% (START_CHARGE_THRESH_BAT0=75)
##     Stop Charge Threshold: 80% (STOP_CHARGE_THRESH_BAT0=80)
##
## Mostly Stationary Users:
##     Start Charge Threshold: 50% (START_CHARGE_THRESH_BAT0=50)
##     Stop Charge Threshold: 80% (STOP_CHARGE_THRESH_BAT0=80)
##
## Balanced Approach:
##     Start Charge Threshold: 65% (START_CHARGE_THRESH_BAT0=65)
##     Stop Charge Threshold: 80% (STOP_CHARGE_THRESH_BAT0=80)
START_CHARGE_THRESH_BAT0=50
STOP_CHARGE_THRESH_BAT0=100 # should be 80, but lenovo firmware demands it so otherwise it's funky

USB_AUTOSUSPEND_ON_AC=0
USB_AUTOSUSPEND_ON_BAT=1
# prevent BT reconnection drops while still suspending other USB devices
USB_EXCLUDE_BTUSB=1
